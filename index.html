<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Young Lee</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0f1e;
      color: #fff;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      padding: 1.4rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    nav .logo {
      font-family: 'Georgia', serif;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.2rem;
    }

    nav a {
      text-decoration: none;
      color: rgba(255,255,255,0.6);
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding-bottom: 2px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    nav a:hover {
      color: #fff;
      border-bottom-color: #C9A84C;
    }

    /* HERO */
    .hero {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 0 4rem;
      gap: 4rem;
      min-height: calc(100vh - 70px);
    }

    /* LEFT */
    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-label {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #C9A84C;
      margin-bottom: 1.2rem;
    }

    .hero-name {
      font-size: 4.5rem;
      font-weight: bold;
      line-height: 1.05;
      margin-bottom: 0.8rem;
      white-space: nowrap;
    }

    .hero-title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #C9A84C;
      margin-bottom: 1.5rem;
    }

    .hero-desc {
      font-size: 1rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.55);
      max-width: 440px;
      margin-bottom: 2.5rem;
    }

    .hero-buttons {
      display: flex;
      gap: 1rem;
    }

    .btn-primary {
      background: #C9A84C;
      color: #0a0f1e;
      text-decoration: none;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      font-weight: bold;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #b8963e; }

    .btn-secondary {
      background: transparent;
      color: #fff;
      text-decoration: none;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      border: 1px solid rgba(255,255,255,0.3);
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-secondary:hover {
      border-color: #fff;
      color: #fff;
    }

    /* RIGHT — PHOTO */
    .hero-right {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .photo-wrap {
      position: relative;
      width: 340px;
      height: 340px;
    }

    .photo-wrap::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid #C9A84C;
      opacity: 0.4;
    }

    .photo-wrap img {
      width: 340px;
      height: 340px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* SCROLL ARROW */
    .scroll-arrow {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      animation: bounce 1.8s infinite;
      text-decoration: none;
    }

    .scroll-arrow span {
      display: block;
      width: 10px;
      height: 10px;
      border-right: 2px solid rgba(255,255,255,0.4);
      border-bottom: 2px solid rgba(255,255,255,0.4);
      transform: rotate(45deg);
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(8px); }
    }

    /* FOOTER */
    footer {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 1.2rem 4rem;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
    }

    /* HAMBURGER */
    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      color: #fff;
      padding: 0.2rem 0.5rem;
      line-height: 1;
    }

    @media (max-width: 768px) {
      nav {
        padding: 1rem 1.5rem;
        flex-wrap: wrap;
      }
      .hamburger { display: block; }
      nav ul {
        display: none;
        flex-direction: column;
        gap: 0;
        width: 100%;
        padding: 0.8rem 0 0.2rem;
        border-top: 1px solid rgba(255,255,255,0.15);
        margin-top: 0.8rem;
      }
      nav ul.open { display: flex; }
      nav ul li { padding: 0.6rem 0; }
      .hero {
        grid-template-columns: 1fr;
        padding: 3rem 1.5rem;
        gap: 2.5rem;
        min-height: auto;
      }
      .hero-left { order: 2; align-items: center; text-align: center; }
      .hero-right { order: 1; }
      .hero-name { font-size: 3rem; }
      .hero-desc { max-width: 100%; }
      .hero-buttons { justify-content: center; flex-wrap: wrap; }
      .photo-wrap { width: 220px; height: 220px; }
      .photo-wrap img { width: 220px; height: 220px; }
      .scroll-arrow { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Young Lee</a>
    <button class="hamburger" aria-label="Menu">&#9776;</button>
    <ul>
      <li><a href="about.html">About</a></li>
      <li><a href="career.html">Career</a></li>
      <li><a href="youtube.html">Youtube</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="game.html">Game</a></li>
    </ul>
  </nav>

  <div class="hero">
    <div class="hero-left">
      <div class="hero-label">Welcome</div>
      <div class="hero-name">Young Lee</div>
      <div class="hero-title">Accountant &amp; CPA Candidate</div>
      <p class="hero-desc">
        Senior at Babson College studying Accounting — passionate about Accounting, Finance, and Geopolitics.
      </p>
      <div class="hero-buttons">
        <a href="career.html" class="btn-primary">View Career</a>
        <a href="contact.html" class="btn-secondary">Contact Me</a>
      </div>
    </div>

    <div class="hero-right">
      <div class="photo-wrap">
        <img src="picture of me.jpg" alt="Young Lee">
      </div>
    </div>
  </div>

  <a href="about.html" class="scroll-arrow">
    <span></span>
    <span></span>
  </a>

  <footer>&copy; 2026 Young Lee</footer>


  <script>
    const hamburger = document.querySelector('.hamburger');
    const navUl = document.querySelector('nav ul');
    if (hamburger) {
      hamburger.addEventListener('click', () => navUl.classList.toggle('open'));
    }
  </script>
</body>
</html>
