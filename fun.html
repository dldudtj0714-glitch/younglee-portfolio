<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fun — Young Lee</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      border-bottom: 3px solid #111;
      padding: 1.4rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .logo {
      font-family: 'Georgia', serif;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      color: #111;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.2rem;
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    nav a:hover, nav a.active { border-bottom-color: #111; }

    /* BANNER */
    .banner {
      background: #111;
      color: #fff;
      padding: 4rem 3rem;
    }

    .banner .label {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1rem;
    }

    .banner h1 {
      font-size: 3.5rem;
      font-weight: bold;
    }

    /* GAME AREA */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem;
    }

    .game-title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 2rem;
    }

    #score {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .score-box {
      text-align: center;
      border: 1px solid #ddd;
      padding: 0.5rem 1.2rem;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #999;
    }

    .score-box span {
      display: block;
      font-size: 1.4rem;
      font-weight: bold;
      color: #111;
      margin-top: 0.2rem;
    }

    #status {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 1.5rem;
      min-height: 1.4rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 6px;
      margin-bottom: 2rem;
    }

    .cell {
      background: #f5f5f5;
      border: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
      font-family: 'Georgia', serif;
    }

    .cell:hover:not(.taken) { background: #eee; }
    .cell.x { color: #111; }
    .cell.o { color: #555; }
    .cell.win { background: #111; color: #fff; }

    #restart {
      padding: 0.8rem 2rem;
      font-size: 0.8rem;
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Segoe UI', sans-serif;
      transition: background 0.2s;
    }

    #restart:hover { background: #333; }

    /* FOOTER */
    footer {
      border-top: 1px solid #ddd;
      padding: 1.5rem 3rem;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      color: #aaa;
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Young Lee</a>
    <ul>
      <li><a href="about.html">About</a></li>
      <li><a href="youtube.html">Youtube</a></li>
      <li><a href="career.html">Career</a></li>
      <li><a href="contact.html">Contact</a></li>

    </ul>
  </nav>

  <div class="banner">
    <div class="label">Take a Break</div>
    <h1>Fun</h1>
  </div>

  <div class="content">
    <div class="game-title">Tic Tac Toe</div>

    <div id="score">
      <div class="score-box">X <span id="x-wins">0</span></div>
      <div class="score-box">Draws <span id="draws">0</span></div>
      <div class="score-box">O <span id="o-wins">0</span></div>
    </div>

    <div id="status">X's turn</div>

    <div id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <button id="restart">New Game</button>
  </div>

  <footer>&copy; 2026 Young Lee</footer>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver;
    let scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return { winner: board[a], line: [a, b, c] };
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;
        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');
        const result = checkWinner();
        if (result) {
          gameOver = true;
          if (result.winner) {
            result.line.forEach(idx => cells[idx].classList.add('win'));
            status.textContent = `${result.winner} wins!`;
            scores[result.winner]++;
          } else {
            status.textContent = "It's a draw!";
            scores.D++;
          }
          document.getElementById('x-wins').textContent = scores.X;
          document.getElementById('o-wins').textContent = scores.O;
          document.getElementById('draws').textContent = scores.D;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
        }
      });
    });

    document.getElementById('restart').addEventListener('click', init);
    init();
  </script>

</body>
</html>
