<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youtube — Young Lee</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      border-bottom: 3px solid #111;
      padding: 1.4rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .logo {
      font-family: 'Georgia', serif;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      color: #111;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.2rem;
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    nav a:hover, nav a.active { border-bottom-color: #111; }

    /* BANNER */
    .banner {
      background: #111;
      color: #fff;
      padding: 4rem 3rem;
    }

    .banner .label {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1rem;
    }

    .banner h1 {
      font-size: 3.5rem;
      font-weight: bold;
    }

    /* CONTENT */
    .content {
      max-width: 780px;
      margin: 0 auto;
      padding: 5rem 3rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .channel-name {
      font-size: 2.5rem;
      font-weight: bold;
      font-family: 'Georgia', serif;
      margin-bottom: 0.5rem;
    }

    .channel-sub {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #C9A84C;
      margin-bottom: 3rem;
    }

    .coming-soon {
      border: 2px solid #111;
      padding: 3rem 4rem;
      margin-bottom: 3rem;
    }

    .coming-soon .icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .coming-soon h2 {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 0.8rem;
      font-family: 'Segoe UI', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .coming-soon p {
      font-size: 1rem;
      color: #555;
      line-height: 1.7;
    }

    .yt-btn {
      display: inline-block;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 1rem 2.5rem;
      transition: background 0.2s;
    }

    .yt-btn:hover { background: #333; }

    /* FOOTER */
    footer {
      border-top: 1px solid #ddd;
      padding: 1.5rem 3rem;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.78rem;
      color: #aaa;
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Young Lee</a>
    <ul>
      <li><a href="about.html">About</a></li>
      <li><a href="career.html">Career</a></li>
      <li><a href="youtube.html" class="active">Youtube</a></li>
      <li><a href="contact.html">Contact</a></li>

      <li><a href="game.html">Game</a></li>
    </ul>
  </nav>

  <div class="banner">
    <div class="label">Channel</div>
    <h1>Youtube</h1>
  </div>

  <div class="content">
    <div class="channel-name">세계와돈</div>
    <div class="channel-sub">World &amp; Money</div>

    <div class="coming-soon">
      <div class="icon">▶</div>
      <h2>Coming Soon</h2>
      <p>Content is on the way. Stay tuned for geopolitics, global economics,<br>and the forces that shape our world.</p>
    </div>

    <a href="https://www.youtube.com/@%EC%84%B8%EA%B3%84%EC%99%80%EB%8F%88" target="_blank" class="yt-btn">Visit Channel</a>
  </div>

  <footer>&copy; 2026 Young Lee</footer>

</body>
</html>
